<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Actor Movies</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ===== BASE ===== */
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Montserrat', sans-serif;
  min-height: 100vh;
  color: #fff;
  line-height: 1.4;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 40px 20px;

  /* ===== DARK BLUE CINEMATIC BACKGROUND ===== */
  background: linear-gradient(135deg, #0a0f2f, #000d1a 80%);
}

/* ===== ACTOR HEADER ===== */
.actor-header {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-bottom: 50px;
}
.actor-header img {
  width: 180px;
  height: 270px;
  border-radius: 16px;
  border: 3px solid #1e90ff;
  box-shadow: 0 12px 50px rgba(30,144,255,0.6);
  object-fit: cover;
  transition: transform 0.4s ease, box-shadow 0.4s ease;
}
.actor-header img:hover {
  transform: scale(1.06) rotate(-1deg);
  box-shadow: 0 25px 70px rgba(30,144,255,0.85);
}
.actor-header h2 {
  margin-top: 20px;
  font-size: 28px;
  color: #1e90ff;
  text-shadow: 2px 2px 12px rgba(0,0,0,0.8);
  text-align: center;
  letter-spacing: 1px;
}

/* ===== GRID ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 30px;
  width: 100%;
  max-width: 1200px;
}

/* ===== MOVIE CARD ===== */
.card {
  background: linear-gradient(145deg, #1a1f3a, #101426);
  border-radius: 16px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.35s ease, box-shadow 0.35s ease;
  display: flex;
  flex-direction: column;
  color: #fff;
  border: 1px solid rgba(30,144,255,0.1);
  box-shadow: 0 5px 20px rgba(0,0,0,0.5);
}
.card img {
  width: 100%;
  height: 280px;
  object-fit: cover;
  transition: transform 0.35s ease;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.card h3 {
  margin: 12px 10px 4px;
  font-size: 16px;
  text-align: center;
  color: #1e90ff;
  font-weight: 600;
  word-wrap: break-word;
}
.card .subtitle {
  font-size: 14px;
  color: #ccc;
  text-align: center;
  margin: 4px 10px 12px;
  word-wrap: break-word;
}
.card:hover {
  transform: translateY(-12px) scale(1.05);
  box-shadow: 0 30px 70px rgba(30,144,255,0.85);
}
.card:hover img {
  transform: scale(1.08);
}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .actor-header img { width: 150px; height: 225px; }
  .actor-header h2 { font-size: 24px; }
  .card img { height: 220px; }
}
@media(max-width:480px){
  .actor-header img { width: 120px; height: 180px; }
  .actor-header h2 { font-size: 20px; }
  .card img { height: 180px; }
  .card h3, .card .subtitle { font-size: 13px; }
}
</style>
</head>
<body>

<div class="actor-header" id="actor-info"></div>

<div class="grid" id="actor-movies"></div>

<script src="data.js"></script>
<script>
function getParam(name){ return new URLSearchParams(window.location.search).get(name); }

function renderActorMovies(){
  const name = getParam("name");
  const actorData = movies.flatMap(m => m.actors).find(a => a.name === name);
  const actorDiv = document.getElementById("actor-info");

  if(actorData){
    actorDiv.innerHTML = `
      <img src="${actorData.image}" alt="${actorData.name}">
      <h2>${actorData.name}</h2>
    `;
  }

  const container = document.getElementById("actor-movies");
  const actorMovies = movies.filter(m => m.actors.some(a => a.name === name));

  actorMovies.forEach(m => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <img src="${m.thumbnail}" alt="${m.title}">
      <h3>${m.title}</h3>
      <div class="subtitle">${m.categories.join(", ")}</div>
    `;
    div.onclick = () => window.location.href = `list.html?id=${m.id}`;
    container.appendChild(div);
  });
}

renderActorMovies();
</script>

</body>
</html>
