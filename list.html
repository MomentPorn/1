<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Movie Details</title>
<style>
/* === BASE STYLES === */
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: linear-gradient(180deg,#0a0f3f,#000b20);
  color:#1e90ff; /* text blue */
}

/* === ACTORS SECTION === */
.actors-section {
  display:flex;
  gap:20px;
  overflow-x:auto;
  padding:20px;
  scroll-behavior:smooth;
}
.actors-section::-webkit-scrollbar { height:10px; }
.actors-section::-webkit-scrollbar-thumb {
  background: #1e90ff;
  border-radius:5px;
}

/* === ACTOR CARD === */
.actor-card {
  position: relative;
  flex:0 0 auto;
  width:120px;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  transition: transform 0.3s, box-shadow 0.3s;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.actor-card img {
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:15px;
  border: 2px solid #1e90ff;
  box-shadow: 0 5px 15px rgba(30,144,255,0.5);
  transition: transform 0.3s, box-shadow 0.3s;
}
.actor-card:hover img {
  transform: scale(1.05);
  box-shadow: 0 15px 35px rgba(30,144,255,0.7);
}
.actor-card h3 {
  margin-top:8px;
  font-size:14px;
  text-align:center;
  color:#1e90ff;
  font-weight:600;
  transition: color 0.3s, font-size 0.3s;
}
.actor-card:hover h3 {
  color:#6495ed;
  font-size:15px;
}

/* === PLAYER === */
.player {
  width:100%;
  max-width:900px;
  margin:20px auto;
  position:relative;
  padding-top:56.25%;
  border-radius:15px;
  overflow:hidden;
  box-shadow:0 15px 35px rgba(30,144,255,0.5);
}
.player iframe {
  position:absolute;
  top:0; left:0;
  width:100%;
  height:100%;
  border:none;
  border-radius:15px;
}

/* === VIDEO TITLE === */
header#movie-title {
  text-align:center;
  font-size:2rem;
  font-weight:700;
  margin:15px 20px;
  padding:10px 0;
  background: linear-gradient(90deg,#1e90ff,#6495ed);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
  border-radius:10px;
}

/* === CATEGORY GRID === */
.grid {
  display:flex;
  flex-wrap:wrap;
  gap:15px;
  padding:0 20px 20px 20px;
}
.card-category {
  display:inline-block;
  font-size:14px;
  background: linear-gradient(135deg,#1e90ff,#6495ed);
  color:#fff;
  border-radius:25px;
  padding:6px 18px;
  cursor:pointer;
  transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
}
.card-category:hover {
  background: linear-gradient(135deg,#6495ed,#1e90ff);
  transform:scale(1.05);
  box-shadow:0 6px 15px rgba(30,144,255,0.7);
}

/* === SIMILAR MOVIES GRID === */
#similar-movies {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
  gap:20px;
  padding:20px;
}

/* === SIMILAR MOVIE CARD === */
.similar-card {
  position: relative;
  border-radius:15px;
  overflow:hidden;
  cursor:pointer;
  background:#1a1f3a;
  box-shadow: 0 8px 25px rgba(30,144,255,0.5);
  transition: transform 0.3s, box-shadow 0.3s;
  display:flex;
  flex-direction:column;
}
.similar-card img {
  width:100%;
  height:220px;
  object-fit:cover;
  transition: transform 0.3s;
}
.similar-card h3 {
  margin:10px;
  font-size:16px;
  text-align:center;
  color:#1e90ff;
}
.similar-card:hover {
  transform:scale(1.05);
  box-shadow:0 15px 40px rgba(30,144,255,0.8);
}
.similar-card:hover img { transform:scale(1.05); }

/* === RESPONSIVE === */
@media(max-width:768px){
  .actor-card { width:90px; }
  .actor-card img { height:120px; }
  .actor-card h3 { font-size:12px; margin-top:6px; }
  header#movie-title { font-size:1.6rem; margin:10px; }
  .card-category { font-size:12px; padding:5px 14px; }
  #similar-movies { grid-template-columns:repeat(2,1fr); }
}
@media(max-width:480px){
  .actor-card { width:70px; }
  .actor-card img { height:100px; }
  .actor-card h3 { font-size:11px; margin-top:4px; }
  .card-category { font-size:11px; padding:4px 12px; }
  #similar-movies { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<!-- ACTORS -->
<div class="actors-section" id="actors"></div>

<!-- PLAYER -->
<div class="player">
  <iframe id="movie-video" src="" allowfullscreen></iframe>
</div>

<!-- VIDEO TITLE -->
<header id="movie-title"></header>

<!-- CATEGORIES -->
<div class="grid" id="categories"></div>

<!-- SIMILAR MOVIES -->
<div class="grid" id="similar-movies"></div>

<script src="data.js"></script>
<script>
function getParam(name){return new URLSearchParams(window.location.search).get(name);}
function renderMovie(){
  const id = getParam("id");
  const movie = movies.find(m=>m.id==id);
  if(!movie) return;

  // Title
  document.getElementById("movie-title").textContent = movie.title;

  // Player
  document.getElementById("movie-video").src = `https://vk.com/video_ext.php?oid=${id.split("_")[0]}&id=${id.split("_")[1]}&hd=2`;

  // Actors
  const actContainer = document.getElementById("actors");
  movie.actors.forEach(a=>{
    const div = document.createElement("div");
    div.className = "actor-card";
    div.innerHTML = `<img src="${a.image}" alt="${a.name}"><h3>${a.name}</h3>`;
    div.onclick = ()=>window.location.href=`actors.html?name=${encodeURIComponent(a.name)}`;
    actContainer.appendChild(div);
  });

  // Categories
  const catContainer = document.getElementById("categories");
  movie.categories.forEach(c=>{
    const div = document.createElement("div");
    div.className = "card-category";
    div.textContent = c;
    div.onclick = ()=>window.location.href=`kategory.html?cat=${encodeURIComponent(c)}`;
    catContainer.appendChild(div);
  });

  // Similar movies
  renderSimilarMovies(movie);
}

function renderSimilarMovies(movie){
  const similarContainer = document.getElementById("similar-movies");
  similarContainer.innerHTML = "";

  const actorMatches = movies.filter(m=>
    m.id !== movie.id &&
    m.actors.some(a=> movie.actors.map(x=>x.name).includes(a.name))
  );

  const categoryMatches = movies.filter(m=>
    m.id !== movie.id &&
    !actorMatches.includes(m) &&
    m.categories.some(c=> movie.categories.includes(c))
  );

  const combined = [...actorMatches, ...categoryMatches].slice(0,4);

  combined.forEach(f=>{
    const div = document.createElement("div");
    div.className = "similar-card";
    div.innerHTML = `<img src="${f.thumbnail}" alt="${f.title}"><h3>${f.title}</h3>`;
    div.onclick = ()=>window.location.href=`list.html?id=${f.id}`;
    similarContainer.appendChild(div);
  });
}

renderMovie();
</script>
</body>
</html>
