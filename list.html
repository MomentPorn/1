<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Details</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Montserrat', sans-serif;
  background:#121212;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:10px;
}

/* === ACTORS SECTION === */
.actors-section {
  display:flex;
  gap:10px;
  overflow-x:auto;
  padding:10px 0;
  margin-bottom:20px;
  scroll-behavior:smooth;
  justify-content:flex-start; /* chapga tekislash */
}
.actors-section::-webkit-scrollbar { height:8px; }
.actors-section::-webkit-scrollbar-thumb {
  background: #ff4500;
  border-radius:4px;
}
.actor-card {
  flex:0 0 auto;
  width:100px;
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
  transition: transform 0.3s;
}
.actor-card img {
  width:100%;
  height:140px;
  object-fit:cover;
  border-radius:12px;
  border:2px solid #ff4500;
  box-shadow:0 5px 15px rgba(255,69,0,0.5);
  transition: transform 0.3s, box-shadow 0.3s;
}
.actor-card:hover img {
  transform: scale(1.05);
  box-shadow:0 15px 35px rgba(255,69,0,0.7);
}
.actor-card h3 {
  margin-top:5px;
  font-size:12px;
  text-align:center;
  color:#ff4500;
  font-weight:600;
}
.actor-card:hover h3 { color:#ffd700; font-size:13px; }

/* === VIDEO PLAYER === */
.player {
  width:100%;
  max-width:500px; /* telefon ekraniga mos */
  position:relative;
  padding-top:56.25%; /* 16:9 ratio */
  border-radius:12px;
  overflow:hidden;
  margin-bottom:20px;
  box-shadow:0 10px 25px rgba(255,69,0,0.5);
}
.player video {
  position:absolute;
  top:0; left:0;
  width:100%;
  height:100%;
  border:none;
  border-radius:12px;
}

/* === MOVIE TITLE === */
#movie-title {
  font-size:1.8rem;
  font-weight:700;
  margin:10px 0;
  text-align:center;
  background: linear-gradient(90deg,#ff4500,#ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow:2px 2px 6px rgba(0,0,0,0.7);
}

/* === CATEGORIES === */
.grid-categories {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  justify-content:center;
  margin-bottom:20px;
}
.card-category {
  padding:5px 15px;
  background: linear-gradient(135deg,#ff4500,#ffd700);
  border-radius:20px;
  cursor:pointer;
  color:#fff;
  transition: transform 0.3s, background 0.3s;
  font-size:12px;
}
.card-category:hover {
  background: linear-gradient(135deg,#ffd700,#ff4500);
  transform:scale(1.05);
}

/* === SIMILAR MOVIES === */
#similar-movies {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:10px;
  width:100%;
  max-width:500px; /* telefon ekraniga mos */
  margin-bottom:30px;
}
.similar-card {
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition: transform 0.3s, box-shadow 0.3s;
  background:#1f1f1f;
  box-shadow:0 6px 20px rgba(255,69,0,0.5);
  display:flex;
  flex-direction:column;
}
.similar-card img { width:100%; height:150px; object-fit:cover; transition: transform 0.3s; }
.similar-card h3 { text-align:center; color:#ff4500; margin:5px; font-size:14px; }
.similar-card:hover { transform:scale(1.05); box-shadow:0 12px 30px rgba(255,69,0,0.7); }
.similar-card:hover img { transform:scale(1.05); }

/* === RESPONSIVE === */
@media(max-width:768px){
  .actor-card { width:80px; }
  .actor-card img { height:110px; }
  .actor-card h3 { font-size:11px; }
  #similar-movies { grid-template-columns:repeat(2,1fr); }
  .player { max-width:100%; }
}
@media(max-width:480px){
  .actor-card { width:70px; }
  .actor-card img { height:90px; }
  .actor-card h3 { font-size:10px; }
  #similar-movies { grid-template-columns:repeat(2,1fr); }
}
</style>
</head>
<body>

<!-- ACTORS -->
<div class="actors-section" id="actors"></div>

<!-- VIDEO PLAYER -->
<div class="player">
  <video id="movie-video" controls autoplay muted playsinline></video>
</div>

<!-- MOVIE TITLE -->
<div id="movie-title"></div>

<!-- CATEGORIES -->
<div class="grid-categories" id="categories"></div>

<!-- SIMILAR MOVIES -->
<div id="similar-movies"></div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="data.js"></script>
<script>
function getParam(name){return new URLSearchParams(window.location.search).get(name);}

function renderMovie(){
  const titleEl = document.getElementById("movie-title");
  const videoEl = document.getElementById("movie-video");
  const actorsEl = document.getElementById("actors");
  const categoriesEl = document.getElementById("categories");
  const similarEl = document.getElementById("similar-movies");

  const movieId = getParam("id");
  const movie = movies[movieId] || movies.find((m,i)=> i==movieId || m.title==movieId) || movies[0];
  if(!movie) return;

  // Player
  if(movie.video.endsWith(".m3u8") && Hls.isSupported()){
    const hls = new Hls();
    hls.loadSource(movie.video);
    hls.attachMedia(videoEl);
    hls.on(Hls.Events.MANIFEST_PARSED, ()=>videoEl.play());
  } else {
    videoEl.src = movie.video;
  }

  // Title
  titleEl.textContent = movie.title;

  // Actors
  actorsEl.innerHTML = "";
  movie.actors.forEach(a=>{
    const div = document.createElement("div");
    div.className="actor-card";
    div.innerHTML = `<img src="${a.image}" alt="${a.name}"><h3>${a.name}</h3>`;
    div.onclick = ()=>window.location.href=`actors.html?name=${encodeURIComponent(a.name)}`;
    actorsEl.appendChild(div);
  });

  // Categories
  categoriesEl.innerHTML="";
  movie.categories.forEach(c=>{
    const div = document.createElement("div");
    div.className="card-category";
    div.textContent=c;
    div.onclick = ()=>window.location.href=`kategory.html?cat=${encodeURIComponent(c)}`;
    categoriesEl.appendChild(div);
  });

  // Similar Movies
  renderSimilarMovies(movie, similarEl);
}

function renderSimilarMovies(movie, container){
  container.innerHTML="";
  const actorMatches = movies.filter(m=> m !== movie && m.actors.some(a=> movie.actors.map(x=>x.name).includes(a.name)));
  const categoryMatches = movies.filter(m=> m !== movie && !actorMatches.includes(m) && m.categories.some(c=> movie.categories.includes(c)));
  const combined = [...actorMatches, ...categoryMatches].slice(0,4);
  combined.forEach(f=>{
    const div = document.createElement("div");
    div.className="similar-card";
    div.innerHTML=`<img src="${f.thumbnail}" alt="${f.title}"><h3>${f.title}</h3>`;
    div.onclick=()=>window.location.href=`list.html?id=${f.title}`;
    container.appendChild(div);
  });
}

renderMovie();
</script>
</body>
</html>
