<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoonHub</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: #fff;
  min-height: 100vh;
  padding: 20px 0;
}
h1 {
  text-align: center;
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(90deg, #ff6a00, #ee0979);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
  margin-bottom: 20px;
}
.search-bar {
  width: 90%;
  max-width: 400px;
  margin: 0 auto 20px auto;
  text-align: center;
}
.search-bar input {
  width: 100%;
  padding: 12px 16px;
  font-size: 14px;
  border-radius: 25px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.05);
  color: #fff;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  transition: 0.3s;
}
.search-bar input::placeholder { color: #ccc; }
.search-bar input:focus {
  background: rgba(255,255,255,0.1);
  box-shadow: 0 6px 20px rgba(238,9,121,0.5);
  transform: scale(1.02);
}
.horizontal-scroll {
  display: flex;
  overflow-x: auto;
  gap: 12px;
  padding: 10px 10px 20px 10px;
}
.horizontal-scroll::-webkit-scrollbar { height:6px; }
.horizontal-scroll::-webkit-scrollbar-thumb { background: linear-gradient(45deg, #ff6a00, #ee0979); border-radius:4px; }
.horizontal-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  padding: 0 10px 20px 10px;
  justify-content: center;
}

/* MOVIE CARD */
.movie-card {
  background: linear-gradient(145deg, #1a1f3a, #101426);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  display: flex;
  flex-direction: column;
  color: #fff;
  width: 48%;
  height: 250px; /* biroz uzun qilindi */
}
.movie-card img {
  width: 100%;
  height: 180px; /* rasm balandligi oshirildi */
  object-fit: cover;
  transition: transform 0.3s ease;
}
.movie-card .info {
  padding: 8px;
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}
.movie-card .info h3 {
  margin: 0;
  font-size: 16px;
  font-weight: 600;
  color: #1e90ff;
  text-align: center;
  line-height: 1.2;
}
.movie-card:hover {
  transform: translateY(-6px) scale(1.03);
  box-shadow: 0 20px 50px rgba(30,144,255,0.6);
}
.movie-card:hover img { transform: scale(1.05); }

/* ACTOR CARD */
.actor-card {
  width: 120px;
  min-width: 120px;
  background: linear-gradient(145deg, #1a1a1a, #222222);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
  display: flex;
  flex-direction: column;
  text-align: center;
}
.actor-card img {
  width: 100%;
  height: 200px; /* kattaroq qilib bosh kesilishini oldini oldik */
  object-fit: cover;
  border-radius: 12px 12px 0 0;
  transition: transform 0.3s, box-shadow 0.3s;
}
.actor-card .actor-name {
  padding: 6px 0;
  font-size: 12px;
  font-weight: 600;
  color: #ff6a00;
  background: #1a1a1a;
  line-height: 1.2;
}
.actor-card:hover {
  transform: scale(1.05);
  box-shadow: 0 12px 28px rgba(238,9,121,0.5);
  background: linear-gradient(145deg, #222, #333);
  color: #ff8a00;
}

/* CATEGORY CARD */
.category-card {
  width: 70px;
  background: linear-gradient(145deg, #1a1f3a, #101426);
  border-radius: 12px;
  text-align: center;
  font-weight:600;
  color:#ffd700;
  padding:5px 0;
  cursor:pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}
.category-card:hover {
  transform: scale(1.05);
  box-shadow: 0 10px 20px rgba(255,215,0,0.5);
}

/* RESPONSIVE */
@media(max-width:480px){
  h1 { font-size:1.5rem; }
  .search-bar input { font-size:13px; padding:10px 12px; }

  .movie-card { width:100%; height:220px; }
  .movie-card img { height:160px; }
  .movie-card .info h3 { font-size:14px; }

  .actor-card { width:100px; }
  .actor-card img { height:160px; }
  .actor-card .actor-name { font-size:10px; }

  .category-card { width:60px; font-size:10px; }
}
</style>
</head>
<body>

<h1>🎬 MoonHub</h1>

<div class="search-bar">
  <input type="text" id="search" placeholder="Kino yoki aktyor qidirish...">
</div>

<div class="horizontal-scroll" id="actors-results"></div>
<div class="horizontal-scroll" id="categories-results"></div>
<div class="grid" id="movies-results"></div>

<script src="data.js"></script>
<script>
const searchInput = document.getElementById("search");
const moviesContainer = document.getElementById("movies-results");
const actorsContainer = document.getElementById("actors-results");
const categoriesContainer = document.getElementById("categories-results");

function renderResults(){
  const q = searchInput.value.toLowerCase();

  // Kino filter
  const filteredMovies = movies.filter(m =>
    m.title.toLowerCase().includes(q) ||
    m.actors.some(a => a.name.toLowerCase().includes(q))
  );
  moviesContainer.innerHTML = "";
  filteredMovies.forEach(m => {
    const div = document.createElement("div");
    div.className = "movie-card";
    div.innerHTML = `
      <img src="${m.thumbnail}" alt="${m.title}">
      <div class="info">
        <h3>${m.title}</h3>
      </div>
    `;
    div.onclick = () => window.location.href=`list.html?id=${encodeURIComponent(m.title)}`;
    moviesContainer.appendChild(div);
  });

  // Aktyor filter
  const filteredActors = actorsList.filter(a => a.name.toLowerCase().includes(q));
  actorsContainer.innerHTML = "";
  filteredActors.forEach(a => {
    const div = document.createElement("div");
    div.className = "actor-card";
    div.innerHTML = `<img src="${a.image}" alt="${a.name}"><div class="actor-name">${a.name}</div>`;
    div.onclick = () => window.location.href=`actors.html?name=${encodeURIComponent(a.name)}`;
    actorsContainer.appendChild(div);
  });

  // Kategoriya filter
  const filteredCategories = categoriesList.filter(c => c.toLowerCase().includes(q));
  categoriesContainer.innerHTML = "";
  filteredCategories.forEach(c => {
    const div = document.createElement("div");
    div.className = "category-card";
    div.textContent = c;
    div.onclick = () => window.location.href=`kategory.html?cat=${encodeURIComponent(c)}`;
    categoriesContainer.appendChild(div);
  });
}

searchInput.addEventListener("input", renderResults);
renderResults();
</script>

</body>
</html>
