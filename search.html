<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoonHub</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: #fff;
  min-height: 100vh;
  padding: 15px 10px;
}
h1 {
  text-align: center;
  font-size: 1.8rem;
  font-weight: 800;
  background: linear-gradient(90deg, #ff6a00, #ee0979);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
  margin-bottom: 15px;
}
.search-bar {
  width: 95%;
  margin: 0 auto 15px auto;
  text-align: center;
}
.search-bar input {
  width: 100%;
  padding: 10px 12px;
  font-size: 13px;
  border-radius: 25px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.05);
  color: #fff;
  box-shadow: 0 4px 10px rgba(0,0,0,0.5);
  transition: 0.3s;
}
.search-bar input::placeholder { color: #ccc; }
.search-bar input:focus {
  background: rgba(255,255,255,0.1);
  box-shadow: 0 6px 18px rgba(238,9,121,0.5);
  transform: scale(1.02);
}
.horizontal-scroll {
  display: flex;
  overflow-x: auto;
  gap: 10px;
  padding: 8px 0 18px 0;
}
.horizontal-scroll::-webkit-scrollbar { height:6px; }
.horizontal-scroll::-webkit-scrollbar-thumb { background: linear-gradient(45deg, #ff6a00, #ee0979); border-radius:4px; }
.horizontal-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
}
/* MOVIE CARD */
.movie-card {
  background: linear-gradient(145deg, #1a1f3a, #101426);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  display: flex;
  flex-direction: column;
  color: #fff;
  width: 100%; /* mobilga moslash */
  max-width: 200px;
  height: 220px;
}
.movie-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  transition: transform 0.3s ease;
}
.movie-card .info {
  padding: 8px;
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}
.movie-card .info h3 {
  margin: 0;
  font-size: 15px;
  font-weight: 600;
  color: #1e90ff;
  text-align: center;
}
.movie-card:hover {
  transform: translateY(-5px) scale(1.02);
  box-shadow: 0 15px 40px rgba(30,144,255,0.5);
}
.movie-card:hover img { transform: scale(1.05); }

/* ACTOR CARD */
.actor-card { 
  width: 100px; 
  min-width: 100px; 
  background: linear-gradient(145deg, #1a1a1a, #222222); 
  border-radius: 12px; 
  overflow: hidden; 
  cursor: pointer; 
  transition: transform 0.3s, box-shadow 0.3s, background 0.3s; 
  display: flex; 
  flex-direction: column; 
  text-align: center; 
}
.actor-card img { width: 100%; height: 140px; object-fit: cover; border-radius: 12px 12px 0 0; transition: transform 0.3s, box-shadow 0.3s; }
.actor-card .actor-name { padding: 5px 0; font-size: 11px; font-weight: 600; color: #ff6a00; background: #1a1a1a; }
.actor-card:hover { transform: scale(1.05); box-shadow: 0 10px 25px rgba(238,9,121,0.5); background: linear-gradient(145deg, #222, #333); color: #ff8a00; }

/* RESPONSIVE */
@media(max-width:480px){
  h1 { font-size:1.5rem; }
  .search-bar input { font-size:12px; padding:8px 10px; }
  .movie-card { max-width:48%; height:180px; }
  .movie-card img { height:110px; }
  .movie-card .info h3 { font-size:14px; }
  .actor-card { width:90px; }
  .actor-card img { height:120px; }
  .actor-card .actor-name { font-size:10px; }
}
</style>
</head>
<body>

<h1>🎬 MoonHub</h1>

<div class="search-bar">
  <input type="text" id="search" placeholder="Kino yoki aktyor qidirish...">
</div>

<div class="horizontal-scroll" id="actors-results"></div>
<div class="grid" id="movies-results"></div>

<script src="data.js"></script>
<script>
const searchInput = document.getElementById("search");
const moviesContainer = document.getElementById("movies-results");
const actorsContainer = document.getElementById("actors-results");

function renderResults(){
  const q = searchInput.value.toLowerCase();

  // Kino filter
  const filteredMovies = movies.filter(m =>
    m.title.toLowerCase().includes(q) ||
    m.actors.some(a => a.name.toLowerCase().includes(q))
  );
  moviesContainer.innerHTML = "";
  filteredMovies.forEach(m => {
    const div = document.createElement("div");
    div.className = "movie-card";
    div.innerHTML = `
      <img src="${m.thumbnail}" alt="${m.title}">
      <div class="info">
        <h3>${m.title}</h3>
      </div>
    `;
    div.onclick = () => window.location.href=`list.html?id=${encodeURIComponent(m.title)}`;
    moviesContainer.appendChild(div);
  });

    div.onclick = () => window.location.href=`actors.html?name=${encodeURIComponent(a.name)}`;
    actorsContainer.appendChild(div);
  });
}

searchInput.addEventListener("input", renderResults);
renderResults();
</script>

</body>
</html>
