<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoonHub</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* ===== BASE ===== */
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family: 'Montserrat', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  color: #fff;
  min-height: 100vh;
  padding: 20px 0;
}

/* ===== HEADER ===== */
h1 {
  text-align: center;
  font-size: 2rem;
  font-weight: 800;
  background: linear-gradient(90deg, #ff6a00, #ee0979);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
  margin-bottom: 20px;
}

/* ===== SEARCH BAR ===== */
.search-bar {
  width: 90%;
  max-width: 400px;
  margin: 0 auto 20px auto;
  text-align: center;
}

.search-bar input {
  width: 100%;
  padding: 12px 16px;
  font-size: 14px;
  border-radius: 25px;
  border: none;
  outline: none;
  background: rgba(255,255,255,0.05);
  color: #fff;
  box-shadow: 0 4px 15px rgba(0,0,0,0.5);
  transition: 0.3s;
}
.search-bar input::placeholder { color: #ccc; }

.search-bar input:focus {
  background: rgba(255,255,255,0.1);
  box-shadow: 0 6px 20px rgba(238,9,121,0.5);
  transform: scale(1.02);
}

/* ===== HORIZONTAL SCROLL ===== */
.horizontal-scroll {
  display: flex;
  overflow-x: auto;
  gap: 15px;
  padding: 10px 10px 20px 10px;
}
.horizontal-scroll::-webkit-scrollbar { height:6px; }
.horizontal-scroll::-webkit-scrollbar-thumb { background: linear-gradient(45deg, #ff6a00, #ee0979); border-radius:4px; }
.horizontal-scroll::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }

/* ===== CARD STYLES ===== */
.card {
  flex: 0 0 auto;
  background: linear-gradient(145deg, #1f1f1f, #2c2c2c);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
  display: flex;
  flex-direction: column;
  text-align: center;
  color: #fff;
}

.card img {
  width: 100%;
  object-fit: cover;
  border-bottom: 1px solid #333;
  transition: transform 0.3s;
}

.card h3 {
  margin: 5px 5px 2px 5px;
  font-size: 13px;
  font-weight: 600;
}

.card .subtitle {
  font-size: 11px;
  color: #ccc;
  margin-bottom: 5px;
}

.card:hover {
  transform: scale(1.05) translateY(-2px);
  box-shadow: 0 10px 30px rgba(238,9,121,0.5);
}
.card:hover img { transform: scale(1.05); }

/* ===== ACTOR CARD ===== */
.actor-card {
  width: 120px;
  background: linear-gradient(145deg, #1a1a1a, #222222);
  border-radius: 12px;
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s, background 0.3s;
  display: flex;
  flex-direction: column;
  text-align: center;
}

.actor-card img {
  width: 100%;
  height: 200px;
  object-fit: cover;
  border-radius: 12px 12px 0 0;
  transition: transform 0.3s, box-shadow 0.3s;
}

.actor-card .actor-name {
  padding: 6px 0;
  font-size: 12px;
  font-weight: 600;
  color: #ff6a00;
  background: #1a1a1a;
}

.actor-card:hover {
  transform: scale(1.05);
  box-shadow: 0 14px 30px rgba(238,9,121,0.5);
  background: linear-gradient(145deg, #222, #333);
  color: #ff8a00;
}

/* ===== GRID (Movie Results) ===== */
.grid {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  padding: 0 10px 20px 10px;
  justify-content: center;
}

.grid .card {
  width: 45%;
  height: 180px;
}

@media(max-width:480px){
  h1 { font-size:1.6rem; }
  .search-bar input { font-size:13px; padding:10px 12px; }
  .actor-card { width:100px; }
  .actor-card img { height:160px; }
  .grid .card { width:100%; height:150px; }
  .card h3 { font-size:12px; }
  .card .subtitle { font-size:10px; }
  .actor-card .actor-name { font-size:11px; }
}
</style>
</head>
<body>

<h1>🎬 MoonHub</h1>

<div class="search-bar">
  <input type="text" id="search" placeholder="Kino, kategoriya yoki aktyor qidirish...">
</div>

<!-- HORIZONTAL SCROLLS AND GRID -->
<div class="horizontal-scroll" id="actors-results"></div>
<div class="horizontal-scroll" id="categories-results"></div>
<div class="grid" id="movies-results"></div>

<script src="data.js"></script>
<script>
const searchInput = document.getElementById("search");
const moviesContainer = document.getElementById("movies-results");
const actorsContainer = document.getElementById("actors-results");
const categoriesContainer = document.getElementById("categories-results");

function renderResults(){
  const q = searchInput.value.toLowerCase();

  // Kino filter
  const filteredMovies = movies.filter(m =>
    m.title.toLowerCase().includes(q) ||
    m.categories.some(c => c.toLowerCase().includes(q)) ||
    m.actors.some(a => a.name.toLowerCase().includes(q))
  );
  moviesContainer.innerHTML = "";
  filteredMovies.forEach(m => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<img src="${m.thumbnail}" alt="${m.title}"><h3>${m.title}</h3><div class="subtitle">${m.categories.join(", ")}</div>`;
    div.onclick = () => window.location.href=`list.html?id=${encodeURIComponent(m.title)}`;
    moviesContainer.appendChild(div);
  });

  // Aktyor filter
  const filteredActors = actorsList.filter(a => a.name.toLowerCase().includes(q));
  actorsContainer.innerHTML = "";
  filteredActors.forEach(a => {
    const div = document.createElement("div");
    div.className = "card actor-card";
    div.innerHTML = `<img src="${a.image}" alt="${a.name}"><div class="actor-name">${a.name}</div>`;
    div.onclick = () => window.location.href=`actors.html?name=${encodeURIComponent(a.name)}`;
    actorsContainer.appendChild(div);
  });

  // Kategoriya filter
  const filteredCategories = categoriesList.filter(c => c.toLowerCase().includes(q));
  categoriesContainer.innerHTML = "";
  filteredCategories.forEach(c => {
    const div = document.createElement("div");
    div.className = "card";
    div.style.width = "90px";
    div.innerHTML = `<h3>${c}</h3>`;
    div.onclick = () => window.location.href=`kategory.html?cat=${encodeURIComponent(c)}`;
    categoriesContainer.appendChild(div);
  });
}

searchInput.addEventListener("input", renderResults);
renderResults();
</script>

</body>
</html>
