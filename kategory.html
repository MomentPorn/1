<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Category Movies</title>
<style>
/* === BASE STYLES === */
* { box-sizing: border-box; margin:0; padding:0; }
body {
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background:#121212;
  color:#fff;
  padding:0;
  margin:0;
}

/* === GRID === */
.grid {
  display:flex;
  flex-direction:column;
  gap:20px;
  padding:20px;
  align-items:center;
}

/* === CARD === */
.card {
  position:relative;
  width:100%; /* Eni butun ekran */
  max-width:1000px; /* Desktopda cheklov */
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  background:#1f1f1f;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  display:flex;
  flex-direction:column;
  color:#fff;
}
.card:hover { 
  transform:scale(1.02);
  box-shadow:0 12px 24px rgba(255,69,0,0.7);
}

/* === CARD IMAGE === */
.card img {
  width:100%;
  height:400px; /* Rasm balansi katta */
  object-fit:cover;
  transition: transform 0.4s ease;
}
.card:hover img { transform:scale(1.05); }

/* === CARD TEXT === */
.card h3 {
  margin:10px 0 5px 0;
  font-size:20px;
  font-weight:600;
  color:#fff;
  text-align:center;
}
.card .subtitle {
  font-size:14px;
  color:#ccc;
  text-align:center;
  margin-bottom:10px;
}

/* === PLAY ICON === */
.card .play-icon {
  position:absolute;
  top:50%; left:50%;
  transform:translate(-50%,-50%);
  font-size:2.5rem;
  color:#ff4500;
  opacity:0;
  transition:opacity 0.4s ease;
}
.card:hover .play-icon { opacity:1; }

/* === RESPONSIVE === */
@media(max-width:1024px){
  .card img{height:350px;}
  .card h3{font-size:18px;}
  .card .subtitle{font-size:13px;}
}
@media(max-width:768px){
  .card img{height:280px;}
  .card h3{font-size:16px;}
  .card .subtitle{font-size:12px;}
}
@media(max-width:480px){
  .card img{height:200px;}
  .card h3{font-size:14px;}
  .card .subtitle{font-size:11px;}
}
</style>
</head>
<body>

<div class="grid" id="category-movies"></div>

<script src="data.js"></script>
<script>
function getParam(name){return new URLSearchParams(window.location.search).get(name);}
function renderCategoryMovies(){
  const cat = getParam("cat");
  const container = document.getElementById("category-movies");
  const catMovies = cat ? movies.filter(m=>m.categories.includes(cat)) : movies;

  catMovies.forEach(m => {
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `
      <img src="${m.thumbnail}" alt="${m.title}">
      <h3>${m.title}</h3>
      <div class="subtitle">${m.categories.join(", ")}</div>
      <div class="play-icon">▶</div>
    `;
    div.onclick = () => window.location.href=`list.html?id=${m.id}`;
    container.appendChild(div);
  });
}

renderCategoryMovies();
</script>

</body>
</html>
