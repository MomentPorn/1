<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>MoonHub</title>
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background:#121212;
  color:#fff;
}
a { text-decoration:none; color:inherit; }

/* HEADER */
header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:15px 20px;
  background: linear-gradient(90deg,#e50914,#ff4500);
  position:sticky;
  top:0;
  z-index:1000;
  box-shadow:0 4px 10px rgba(0,0,0,0.6);
}
header h1 {
  font-size:1.6rem;
  font-weight:800;
  background: linear-gradient(90deg,#ff6b6b,#ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  text-shadow:2px 2px 6px rgba(0,0,0,0.5);
  cursor:default;
  transition: transform 0.3s ease;
}
header h1:hover { transform:scale(1.05); }

/* SEARCH ICON */
.search-icon {
  font-size:1.6rem;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  width:40px;
  height:40px;
  border-radius:50%;
  background: linear-gradient(135deg,#ff4500,#ff6b6b);
  box-shadow:0 4px 10px rgba(255,69,0,0.5);
  transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
}
.search-icon:hover {
  transform:scale(1.2);
  box-shadow:0 8px 16px rgba(255,105,0,0.6);
  background: linear-gradient(135deg,#ff6b6b,#ffd700);
}

/* GRID */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));
  gap:15px;
  padding:20px;
}

/* CARD */
.card {
  position:relative;
  border-radius:12px;
  overflow:hidden;
  background:#1f1f1f;
  cursor:pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  height:220px;
}
.card:hover { transform:scale(1.02); box-shadow:0 8px 20px rgba(0,0,0,0.8); }
.card img {
  width:100%;
  height:100%;
  object-fit:cover;
  transition: transform 0.3s ease;
}
.card:hover img { transform:scale(1.05); }

/* OVERLAY */
.card .overlay {
  position:absolute;
  bottom:0; left:0; right:0;
  background: linear-gradient(to top, rgba(31,31,31,0.95), rgba(31,31,31,0));
  padding:8px 10px 10px 10px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}
.card .overlay .subtitle { font-size:0.85rem; color:#ffd700; text-align:center; margin-bottom:3px; }
.card .overlay h3 { font-size:1rem; font-weight:600; margin-top:3px; color:#ff4500; text-align:center; }
.card .overlay .play-icon { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:1.8rem; color:#ff4500; opacity:0; transition:opacity 0.4s ease; }
.card:hover .overlay .play-icon { opacity:1; }

/* RESPONSIVE */
@media(max-width:768px){
  .grid { grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); padding:15px; gap:12px; }
  .card { height:180px; }
  .card .overlay h3 { font-size:0.9rem; }
  .card .overlay .subtitle { font-size:0.75rem; }
}
@media(max-width:480px){
  .grid { grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); padding:10px; gap:10px; }
  .card { height:150px; }
  .card .overlay h3 { font-size:0.8rem; }
  .card .overlay .subtitle { font-size:0.7rem; }
  header h1 { font-size:1.4rem; }
  .search-icon { width:35px; height:35px; font-size:1.4rem; }
}
</style>
</head>
<body>

<header>
  <h1>🎬 Kino Sayt</h1>
  <div class="search-icon" onclick="window.location.href='search.html'">🔍</div>
</header>

<div class="grid" id="videos"></div>

<script src="data.js"></script>
<script>
const container=document.getElementById("videos");

function renderGrid(list){
  container.innerHTML="";
  list.forEach(movie=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`
      <img src="${movie.thumbnail}" alt="${movie.title}">
      <div class="overlay">
        <div class="subtitle">${movie.categories.join(", ")}</div>
        <h3>${movie.title}</h3>
        <div class="play-icon">▶</div>
      </div>
    `;
    div.onclick=()=>window.location.href=`list.html?id=${encodeURIComponent(movie.title)}`;

</script>

</body>
</html>
