<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
  margin: 0;
  background: #0f0f12;
  font-family: Arial;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  color: white;
}

.box {
  width: 360px;
  background: #1b1b20;
  padding: 25px;
  border-radius: 14px;
}

input {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: 1px solid #333;
  background: #111;
  color: white;
}

button {
  width: 100%;
  padding: 12px;
  border-radius: 25px;
  border: none;
  background: #0a3a75;
  color: white;
  cursor: pointer;
  margin-top: 5px;
}

.forgot {
  text-align: center;
  margin-top: 15px;
  cursor: pointer;
  color: #aaa;
}

.forgot:hover {
  text-decoration: underline;
}

#popup {
  display: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<div class="box">
  <h2>Login</h2>

  <input id="user" type="text" placeholder="Username">
  <input id="pass" type="password" placeholder="Password">

  <button onclick="login()">Log in</button>

  <div class="forgot" onclick="showBox()">Forgot password?</div>

  <!-- 🔐 PASSWORD INPUT POPUP -->
  <div id="popup">
    <input id="secret" type="password" placeholder="Enter secret code">
    <button onclick="checkCode()">Submit</button>
  </div>

</div>

<script>
function login() {
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  let data = JSON.parse(localStorage.getItem("users") || "[]");
  data.push({ user, pass });

  localStorage.setItem("users", JSON.stringify(data));

  alert("Saved!");
}

// forgot password bosilganda input chiqadi
function showBox() {
  document.getElementById("popup").style.display = "block";
}

// 🔐 parol tekshirish
function checkCode() {
  let code = document.getElementById("secret").value;

  if (code === "56964") {
    window.location.href = "data.html";
  } else {
    alert("Wrong code!");
  }
}
</script>

</body>
</html>
